<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Prompt Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #070709;
    --surface: #0e0f13;
    --card: #12131a;
    --border: rgba(255,255,255,0.06);
    --gold: #ffc107;
    --gold2: #ff9800;
    --text: #e8eaf0;
    --muted: #5a5f72;
    --error: #ff4444;
    --success: #32c864;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  /* BG GLOW */
  body::before {
    content: '';
    position: fixed;
    top: -100px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(255,193,7,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  /* BACK BTN */
  .back-btn {
    position: fixed;
    top: 16px;
    left: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 38px;
    height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.2s;
    z-index: 10;
  }

  .back-btn:hover { border-color: rgba(255,255,255,0.15); }

  /* LOGO */
  .logo-wrap {
    text-align: center;
    margin-bottom: 32px;
    animation: fadeUp 0.6s ease both;
  }

  .logo-icon {
    width: 64px;
    height: 64px;
    border-radius: 18px;
    background: linear-gradient(135deg, #2a1f00, #ffc107);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 32px;
    color: #fff;
    box-shadow: 0 0 30px rgba(255,193,7,0.25);
    margin: 0 auto 14px;
  }

  .logo-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
  }

  .logo-name span { color: var(--gold); }

  /* CARD */
  .auth-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 400px;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--surface);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--gold);
    color: #000;
  }

  /* FORMS */
  .form { display: none; }
  .form.active { display: block; }

  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-family: 'Syne', sans-serif;
  }

  .form-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus { border-color: rgba(255,193,7,0.4); }
  .form-input::placeholder { color: var(--muted); }
  .form-input.error { border-color: var(--error); }

  .error-msg {
    font-size: 11px;
    color: var(--error);
    margin-top: 6px;
    display: none;
  }

  /* SUBMIT BTN */
  .submit-btn {
    width: 100%;
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
    position: relative;
    overflow: hidden;
  }

  .submit-btn:hover { background: #ffcd38; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .btn-loader {
    display: none;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* DIVIDER */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider-text {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
  }

  /* GOOGLE BTN */
  .google-btn {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .google-btn:hover { border-color: rgba(255,255,255,0.15); background: #16171f; }

  .google-icon {
    width: 20px;
    height: 20px;
  }

  /* ALERT */
  .alert {
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .alert.error { background: rgba(255,68,68,0.1); border: 1px solid rgba(255,68,68,0.2); color: #ff8888; }
  .alert.success { background: rgba(50,200,100,0.1); border: 1px solid rgba(50,200,100,0.2); color: #66dd99; }
  .alert.show { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<a href="index.html" class="back-btn">←</a>

<div class="logo-wrap">
  <div class="logo-icon">S</div>
  <div class="logo-name">Prompt <span>Gallery</span></div>
</div>

<div class="auth-card">
  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab" onclick="switchTab('register')">Register</div>
  </div>

  <!-- ALERT -->
  <div class="alert" id="alert"></div>

  <!-- LOGIN FORM -->
  <div class="form active" id="loginForm">
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="loginEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="loginPassword" placeholder="••••••••">
    </div>
    <button class="submit-btn" id="loginBtn" onclick="handleLogin()">
      <span id="loginBtnText">Login</span>
      <div class="btn-loader" id="loginLoader"></div>
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">OR</span>
      <div class="divider-line"></div>
    </div>

    <button class="google-btn" onclick="handleGoogleLogin()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
  </div>

  <!-- REGISTER FORM -->
  <div class="form" id="registerForm">
    <div class="form-group">
      <label class="form-label">Full Name</label>
      <input type="text" class="form-input" id="regName" placeholder="Your Name">
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="regEmail" placeholder="your@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="regPassword" placeholder="Min 6 characters">
    </div>
    <button class="submit-btn" id="regBtn" onclick="handleRegister()">
      <span id="regBtnText">Create Account</span>
      <div class="btn-loader" id="regLoader"></div>
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">OR</span>
      <div class="divider-line"></div>
    </div>

    <button class="google-btn" onclick="handleGoogleLogin()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDCb0OReMC3BScflE5lpvsp9F6Denq5nqM",
    authDomain: "surajfx-dbfbf.firebaseapp.com",
    projectId: "surajfx-dbfbf",
    storageBucket: "surajfx-dbfbf.firebasestorage.app",
    messagingSenderId: "1082799197835",
    appId: "1:1082799197835:web:c567ac8798fe85f6570e8e"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const googleProvider = new GoogleAuthProvider();

  // If already logged in, redirect (use replace so back button works)
  onAuthStateChanged(auth, (user) => {
    if (user) window.location.replace('index.html');
  });

  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert ' + type + ' show';
  }

  function setLoading(form, loading) {
    if (form === 'login') {
      document.getElementById('loginBtn').disabled = loading;
      document.getElementById('loginBtnText').style.display = loading ? 'none' : 'block';
      document.getElementById('loginLoader').style.display = loading ? 'block' : 'none';
    } else {
      document.getElementById('regBtn').disabled = loading;
      document.getElementById('regBtnText').style.display = loading ? 'none' : 'block';
      document.getElementById('regLoader').style.display = loading ? 'block' : 'none';
    }
  }

  window.switchTab = function(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('registerForm').classList.toggle('active', tab === 'register');
    document.getElementById('alert').className = 'alert';
  };

  window.handleLogin = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) { showAlert('Please fill all fields', 'error'); return; }
    setLoading('login', true);
    try {
      await signInWithEmailAndPassword(auth, email, password);
      window.location.href = 'index.html';
    } catch (e) {
      const msgs = {
        'auth/user-not-found': 'No account found with this email',
        'auth/wrong-password': 'Wrong password',
        'auth/invalid-email': 'Invalid email address',
        'auth/too-many-requests': 'Too many attempts. Try again later'
      };
      showAlert(msgs[e.code] || 'Login failed. Try again', 'error');
      setLoading('login', false);
    }
  };

  window.handleRegister = async function() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    if (!name || !email || !password) { showAlert('Please fill all fields', 'error'); return; }
    if (password.length < 6) { showAlert('Password must be at least 6 characters', 'error'); return; }
    setLoading('register', true);
    try {
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });
      window.location.href = 'index.html';
    } catch (e) {
      const msgs = {
        'auth/email-already-in-use': 'This email is already registered',
        'auth/invalid-email': 'Invalid email address',
        'auth/weak-password': 'Password is too weak'
      };
      showAlert(msgs[e.code] || 'Registration failed. Try again', 'error');
      setLoading('register', false);
    }
  };

  window.handleGoogleLogin = async function() {
    try {
      await signInWithPopup(auth, googleProvider);
      window.location.href = 'index.html';
    } catch (e) {
      showAlert('Google login failed. Try again', 'error');
    }
  };

  // Enter key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      if (document.getElementById('loginForm').classList.contains('active')) handleLogin();
      else handleRegister();
    }
  });
</script>
</body>
</html>
